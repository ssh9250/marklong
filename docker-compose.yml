services:
  app:
    build: .
    container_name: marklong-app
    env_file: .env
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - marklong-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: marklong-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - marklong-net
    restart: unless-stopped

networks:
  marklong-net:
    external: true