spring:
  application:
    name: marklong

  datasource:
    url: jdbc:postgresql://localhost:5432/marklong
    username: ${DB_USERNAME:marklong}
    password: ${DB_PASSWORD:marklong1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  redis:
    host: localhost
    port: 6379
    timeout: 2000
    database: 0

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: marklong-news-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.example.marklong.infra.kafka.dto.NewsEvent
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
          client:
            registration:
              google:
                client-id: ${GOOGLE_CLIENT_ID}
                client-secret: ${GOOGLE_CLIENT_SECRET}
                redirect-uri: "{baseUrl}/login/oauth2/code/google"
                scope:
                  - email
                  - profile

              kakao:
                client-id: ${KAKAO_CLIENT_ID}
                client-secret: ${KAKAO_CLIENT_SECRET}
                redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
                client-authentication-method: client_secret_post
                authorization-grant-type: authorization_code
                scope:
                  - profile_nickname
                  - account_email

              naver:
                client-id: ${NAVER_CLIENT_ID}
                client-secret: ${NAVER_CLIENT_SECRET}
                redirect-uri: "{baseUrl}/login/oauth2/code/naver"
                client-authentication-method: client_secret_post
                authorization-grant-type: authorization_code
                scope:
                  - name
                  - email

            provider:
              kakao:
                authorization-uri: https://kauth.kakao.com/oauth/authorize
                token-uri: https://kauth.kakao.com/oauth/token
                user-info-uri: https://kapi.kakao.com/v2/user/me
                user-name-attribute: id

              naver:
                authorization-uri: https://nid.naver.com/oauth2.0/authorize
                token-uri: https://nid.naver.com/oauth2.0/token
                user-info-uri: https://openapi.naver.com/v1/nid/me
                user-name-attribute: response

resilience4j:
  circuitbreaker:
    instances:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
        recordExceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
  ratelimiter:
    instances:
      default:
        registerHealthIndicator: false
        limitRefreshPeriod: 1m
        limitForPeriod: 100
        timeoutDuration: 5s
  timelimiter:
    instances:
      default:
        cancelRunningFuture: false
        timeoutDuration: 2s

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 1800000
  refresh-expiration-ms: 1209600000


oauth2:
  redirect-uri: http://localhost:3000/oauth/callback