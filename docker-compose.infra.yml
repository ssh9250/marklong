services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: marklong-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-marklong}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marklong1234}
      POSTGRES_DB: marklong
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=timescaledb"
    command:
      - "-c"
      - "timezone=UTC"
      - "-c"
      - "shared_preload_libraries=timescaledb"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-marklong}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: marklong-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Apache Kafka (KRaft 모드) 추가
  kafka:
    image: apache/kafka:3.7.0
    container_name: marklong-kafka
    ports:
      - "9092:9092" # 외부(호스트/스프링부트 로컬 실행) 노출용 포트
    environment:
      # KRaft 모드 활성화 및 브로커 역할 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'

      # 리스너 설정 (내부 통신과 외부 통신 분리)
      KAFKA_LISTENERS: 'CONTROLLER://:9093,PLAINTEXT://:9092,REPLICATION://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://${KAFKA_HOST}:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,REPLICATION:PLAINTEXT'

      # 기본 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # 무작위 클러스터 ID (고유값)
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  kafka-data:

networks:
  marklong-net:
    name: marklong-net
    driver: bridge