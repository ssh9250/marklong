services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: marklong-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-marklong}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marklong1234}
      POSTGRES_DB: marklong
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=timescaledb"
    command:
      - "-c"
      - "timezone=UTC"
      - "-c"
      - "shared_preload_libraries=timescaledb"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-marklong}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: marklong-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  shop-net:
    name: marklong-net
    driver: bridge